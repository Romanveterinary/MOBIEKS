name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Tools
      run: |
        pip install flet
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Accept Android Licenses
      run: yes | flutter doctor --android-licenses

    - name: Step 1 - Generate Flutter Project
      # Ми змушуємо Flet тільки створити папку проекту, без самої збірки
      run: flet build apk --template android --no-output

    - name: Step 2 - Flutter Pub Get
      # Оновлюємо залежності всередині створеного проекту
      run: |
        cd build/flutter
        flutter pub get

    - name: Step 3 - Real Flutter Build
      # Запускаємо пряму збірку, яка не висне і показує лог
      run: |
        cd build/flutter
        flutter build apk --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VetAI-Pro-APK
        path: build/flutter/build/app/outputs/flutter-apk/app-release.apk
        if-no-files-found: error
