name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Flet and Dependencies
      run: |
        pip install flet
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Accept Android Licenses
      run: yes | flutter doctor --android-licenses

    - name: Bootstrap Flet Project
      run: |
        # Ця команда створить структуру проєкту без запуску важкої збірки
        flet create .

    - name: Flutter Build APK
      run: |
        # Пряма команда Flutter — вона працює швидше і не висне
        flutter build apk --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VetAI-Pro-Android-APK
        path: build/app/outputs/flutter-apk/app-release.apk
        if-no-files-found: error
