- name: Build APK (The Final Stand)
      run: |
        # 1. Приймаємо ліцензії
        yes | flutter doctor --android-licenses
        
        # 2. Очищуємо кеш Flutter (про всяк випадок)
        flutter clean
        
        # 3. Примусово ініціалізуємо Flet проект у поточній папці
        flet create . --project-name vetai
        
        # 4. Запускаємо збірку з прямим посиланням на поточну папку
        flet build apk .
