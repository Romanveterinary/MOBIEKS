name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Accept Android Licenses
      run: yes | flutter doctor --android-licenses

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "flet[all]" --upgrade
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Build APK using Flet
      run: |
        # Використовуємо максимально просту команду, щоб уникнути конфліктів версій
        flet build apk --build-number 1 --build-version 1.0.0

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VetAI-Pro-Android-APK
        # Шукаємо APK у стандартній папці виводу Flet
        path: build/apk/*.apk
        if-no-files-found: error
