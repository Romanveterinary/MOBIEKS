- name: Build APK (Minimalist)
      run: |
        # Спочатку ліцензії (це пройшло успішно минулого разу)
        yes | flutter doctor --android-licenses
        
        # Чиста збірка без жодних аргументів, крім типу
        # Ми прибрали --project-name, щоб не провокувати помилку
        flet build apk
