name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Tools
      run: |
        python -m pip install --upgrade pip
        pip install flet
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Accept Android Licenses
      run: yes | flutter doctor --android-licenses

    - name: Prepare Flet Project
      # Створюємо лише структуру проекту. Це не забере багато часу.
      run: flet build apk --project-name "vetai"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: VetAI-Pro-APK
        # Шукаємо файл скрізь, де він міг з'явитися
        path: |
          build/apk/*.apk
          build/flutter/build/app/outputs/flutter-apk/*.apk
          build/app/outputs/flutter-apk/*.apk
        if-no-files-found: error
